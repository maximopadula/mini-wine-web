backend:
  name: git-gateway
  branch: main 

local_backend: true 

media_folder: "recursos/imagenes/catalogo" 
public_folder: "./recursos/imagenes/catalogo" 

collections:
  - name: "base_datos"
    label: "Base de Datos de la Tienda"
    files:
      - label: "Catálogo de Productos"
        name: "productos"
        file: "datos/base_datos/catalogo.json" 
        fields:
          - name: "productos" 
            label: "Lista de Productos"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "number", value_type: "int"} 
              - {label: "Nombre del Vino", name: "nombre", widget: "string"} 
              - {label: "Bodega", name: "bodega", widget: "string", required: false}
              - {label: "Precio", name: "precio", widget: "number", value_type: "float"}
              - {label: "Tipo de Vino", name: "tipo", widget: "string", required: false}
              - {label: "Presentación", name: "presentacion", widget: "string"}
              - name: "imagen"
                label: "Datos de la Imagen"
                widget: "object"
                fields:
                  - {label: "Archivo de foto", name: "src", widget: "image"}
                  - {label: "Texto alternativo (Para no videntes)", name: "alt", widget: "string"}

  - name: "contenido_web"
    label: "Contenido de la Página"
    files:
      - label: "Textos Globales (Pie de página y Contacto)"
        name: "globales"
        file: "datos/contenido_web/globales.json"
        fields:
          - {label: "Logo del Footer", name: "logo_footer", widget: "image"}
          - name: "enlaces_contacto"
            label: "Enlaces de Contacto y Redes Sociales"
            widget: "list"
            fields:
              - {label: "Nombre de la Plataforma (Ej: WhatsApp, TikTok)", name: "plataforma", widget: "string"}
              - {label: "Enlace / URL (Ej: https://wa.me/... o mailto:...)", name: "url", widget: "string"}
              - {label: "Texto a mostrar (Ej: @miniwine)", name: "texto", widget: "string"}
              - {label: "Ícono (PNG o SVG oscuro)", name: "icono", widget: "image"}
              
      - label: "Textos de la página: Catálogo"
        name: "textos_catalogo"
        file: "datos/contenido_web/textos_catalogo.json"
        fields:
          - {label: "Título Principal", name: "titulo_pagina", widget: "string"}
          - {label: "Texto de aclaración (Precios minoristas)", name: "texto_minorista", widget: "string"}
          - {label: "Texto del enlace (Mayoristas)", name: "texto_enlace_mayorista", widget: "string"}
          - {label: "URL del enlace (Hacia dónde lleva)", name: "enlace_mayorista", widget: "string"}

      - label: "Textos de la página: Inicio"
        name: "textos_inicio"
        file: "datos/contenido_web/textos_inicio.json"
        fields:
          - name: "hero"
            label: "1. Sección Principal (Hero)"
            widget: "object"
            fields:
              - {label: "Imagen de fondo", name: "imagen", widget: "image"}
              - {label: "Texto principal", name: "texto", widget: "string"}
          - name: "seccion_nosotros"
            label: "2. Sección Nosotros (Mini Wine)"
            widget: "object"
            fields:
              - {label: "Título", name: "titulo", widget: "string"}
              - {label: "Párrafo", name: "parrafo", widget: "text"}
          - name: "seccion_productos"
            label: "3. Sección Productos"
            widget: "object"
            fields:
              - {label: "Título de la sección", name: "titulo", widget: "string"}
              - name: "producto_1"
                label: "Producto 1 (Individual)"
                widget: "object"
                fields:
                  - {label: "Imagen", name: "imagen", widget: "image"}
                  - {label: "Título", name: "titulo", widget: "string"}
                  - {label: "Párrafo", name: "parrafo", widget: "text"}
              - name: "producto_2"
                label: "Producto 2 (Packs)"
                widget: "object"
                fields:
                  - {label: "Imagen", name: "imagen", widget: "image"}
                  - {label: "Título", name: "titulo", widget: "string"}
                  - {label: "Párrafo", name: "parrafo", widget: "text"}
          - name: "seccion_delivery"
            label: "4. Sección Delivery"
            widget: "object"
            fields:
              - {label: "Título", name: "titulo", widget: "string"}
              - {label: "Texto previo a los barrios", name: "texto_barrios", widget: "string"}
              - label: "Lista de Barrios"
                name: "barrios"
                widget: "list"
                field: {label: "Nombre del Barrio", name: "barrio", widget: "string"}
              - {label: "Aclaración otras zonas", name: "texto_otras_zonas", widget: "string"}
              - {label: "Texto sobre el mapa", name: "texto_mapa", widget: "string"}
              - {label: "URL del Mapa", name: "url_mapa", widget: "string"}
          - name: "seccion_bodega"
            label: "5. Sección Sumar Bodega"
            widget: "object"
            fields:
              - {label: "Título", name: "titulo", widget: "string"}
              - {label: "Párrafo", name: "parrafo", widget: "text"}
              - {label: "Texto del botón", name: "texto_boton", widget: "string"}
              - {label: "Enlace del botón", name: "url_boton", widget: "string"}